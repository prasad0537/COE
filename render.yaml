services:
  - type: web
    name: coe-skill-predictor
    runtime: python
    plan: free
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      cd frontend
      npm ci
      npm run build
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
